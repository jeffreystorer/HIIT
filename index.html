<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIIT Timer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>⏱️</text></svg>">
</head>
<body>
    <div id="fauxBody">
    <div class="container">

        <div class="timer-display">
            <div class="phase-label">Ready</div>
            <div class="rep-label"></div>
            <div class="time">00:10</div>
            <div class="progress-container">
                <div class="progress-circle">
                    <div class="progress-bar"></div>
                    <div class="progress-content">
                        <div class="status-text">
                            <div class="set-rep-display">
                                <div class="workout-name-display"></div>
                                <div class="playlist-progress-display"></div>
                                <div class="set-display">Set 1 of 2</div>
                                <div class="next-phase-display"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="total-duration-display"></div>

        <div class="controls">
            <button id="start-stop">Start</button>
            <button id="reset">Reset</button>
        </div>

        <div class="settings">

            <!-- Sets -->
            <div class="setting-row">
                <label>Sets</label>
                <div class="stepper">
                    <button class="step-down" data-target="sets">-</button>
                    <input type="number" id="sets" min="1" max="20" value="2" readonly>
                    <button class="step-up" data-target="sets">+</button>
                </div>
            </div>

            <!-- Recover -->
            <div class="setting-row">
                <label>
                    Recover
                    <input type="checkbox" id="recover-enabled" checked>
                </label>
                <div class="stepper mmss-stepper" id="recover-stepper">
                    <button class="step-down" data-target="recover-min">-</button>
                    <input type="number" id="recover-min" min="0" max="59" value="0" readonly>
                    <button class="step-up" data-target="recover-min">+</button>
                    <span class="mmss-sep">m:</span>
                    <button class="step-down" data-target="recover-sec">-</button>
                    <input type="number" id="recover-sec" min="0" max="59" value="30" readonly>
                    <button class="step-up" data-target="recover-sec">+</button>
                    <span class="mmss-sep">s</span>
                </div>
            </div>

            <!-- Reps -->
            <div class="setting-row">
                <label>Reps</label>
                <div class="stepper">
                    <button class="step-down" data-target="reps">-</button>
                    <input type="number" id="reps" min="1" max="20" value="2" readonly>
                    <button class="step-up" data-target="reps">+</button>
                </div>
            </div>

            <!-- Work -->
            <div class="setting-row">
                <label>Work</label>
                <div class="stepper mmss-stepper">
                    <button class="step-down" data-target="work-min">-</button>
                    <input type="number" id="work-min" min="0" max="59" value="0" readonly>
                    <button class="step-up" data-target="work-min">+</button>
                    <span class="mmss-sep">m:</span>
                    <button class="step-down" data-target="work-sec">-</button>
                    <input type="number" id="work-sec" min="0" max="59" value="10" readonly>
                    <button class="step-up" data-target="work-sec">+</button>
                    <span class="mmss-sep">s</span>
                </div>
            </div>

            <!-- Rest -->
            <div class="setting-row">
                <label>
                    Rest
                    <input type="checkbox" id="rest-enabled" checked>
                </label>
                <div class="stepper mmss-stepper" id="rest-stepper">
                    <button class="step-down" data-target="rest-min">-</button>
                    <input type="number" id="rest-min" min="0" max="59" value="0" readonly>
                    <button class="step-up" data-target="rest-min">+</button>
                    <span class="mmss-sep">m:</span>
                    <button class="step-down" data-target="rest-sec">-</button>
                    <input type="number" id="rest-sec" min="0" max="59" value="4" readonly>
                    <button class="step-up" data-target="rest-sec">+</button>
                    <span class="mmss-sep">s</span>
                </div>
            </div>

        </div>

        <div class="bottom-buttons">
            <button id="set-default" class="set-default-btn">Set as Default</button>
            <button id="open-library" class="library-btn">📋 Workouts</button>
        </div>

    </div>
    </div>

    <!-- Drawer overlay -->
    <div id="drawer-overlay" class="drawer-overlay"></div>

    <!-- Workout library drawer -->
    <div id="workout-drawer" class="workout-drawer">

        <div class="drawer-header">
            <h2 id="drawer-title">Workouts</h2>
            <button id="close-drawer" class="close-drawer-btn">✕</button>
        </div>

        <!-- Tab bar -->
        <div class="drawer-tabs">
            <button class="drawer-tab active" data-tab="workouts">Workouts</button>
            <button class="drawer-tab" data-tab="playlists">Playlists</button>
        </div>

        <!-- ── Workouts panel ── -->
        <div id="tab-workouts" class="tab-panel active">
            <div class="drawer-save-section">
                <input type="text" id="workout-name" class="workout-name-input" placeholder="Workout name…" maxlength="40">
                <button id="save-workout" class="save-workout-btn">Save Current</button>
            </div>
            <div class="drawer-search">
                <input type="text" id="workout-search" class="workout-search-input" placeholder="🔍 Search workouts…">
            </div>
            <div id="workout-list" class="workout-list"><!-- populated by JS --></div>
            <div class="drawer-footer">
                <button id="export-workouts" class="export-btn">⬆ Export</button>
                <label class="import-btn">
                    ⬇ Import
                    <input type="file" id="import-workouts" accept=".json" style="display:none">
                </label>
            </div>
        </div>

        <!-- ── Playlists panel ── -->
        <div id="tab-playlists" class="tab-panel">
            <div class="drawer-save-section">
                <input type="text" id="playlist-name" class="workout-name-input" placeholder="Playlist name…" maxlength="40">
                <button id="save-playlist" class="save-workout-btn">New</button>
            </div>
            <div id="playlist-list" class="workout-list"><!-- populated by JS --></div>
            <div class="drawer-footer">
                <button id="export-playlists" class="export-btn">⬆ Export</button>
                <label class="import-btn">
                    ⬇ Import
                    <input type="file" id="import-playlists" accept=".json" style="display:none">
                </label>
            </div>
        </div>

    </div>

    <!-- Playlist editor overlay -->
    <div id="playlist-editor-overlay" class="drawer-overlay"></div>

    <!-- Playlist editor drawer -->
    <div id="playlist-editor" class="workout-drawer playlist-editor">
        <div class="drawer-header">
            <button id="playlist-editor-back" class="close-drawer-btn">←</button>
            <h2 id="playlist-editor-title">Edit Playlist</h2>
            <button id="playlist-editor-close" class="close-drawer-btn">✕</button>
        </div>
        <!-- Transition time setting -->
        <div class="playlist-transition-row">
            <label>Transition between workouts</label>
            <div class="stepper mmss-stepper">
                <button class="step-down" data-target="transition-min">-</button>
                <input type="number" id="transition-min" min="0" max="59" value="0" readonly>
                <button class="step-up" data-target="transition-min">+</button>
                <span class="mmss-sep">m:</span>
                <button class="step-down" data-target="transition-sec">-</button>
                <input type="number" id="transition-sec" min="0" max="59" value="5" readonly>
                <button class="step-up" data-target="transition-sec">+</button>
                <span class="mmss-sep">s</span>
            </div>
        </div>
        <div class="drawer-search">
            <input type="text" id="playlist-workout-search" class="workout-search-input" placeholder="🔍 Search to add workouts…">
        </div>
        <div id="playlist-workout-pool" class="workout-list playlist-pool"><!-- workouts to add --></div>
        <div class="playlist-entries-header">Playlist order</div>
        <div id="playlist-entries" class="workout-list playlist-entries"><!-- current entries --></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
